name: Compilar Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y git build-essential curl xz-utils

      - name: Configurar Theos
        run: |
          export THEOS=~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # Baixar SDK 14.5 do repositório oficial do Theos
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/releases/download/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
          tar -xf sdk.tar.xz -C $THEOS/sdks
          rm sdk.tar.xz

      - name: Compilar
        run: |
          export THEOS=~/theos
          make clean
          make

      - name: Upload da dylib
        uses: actions/upload-artifact@v4
        with:
          name: KeyLogin.dylib
          path: .theos/obj/debug/KeyLogin.dylib
