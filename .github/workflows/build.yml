name: Compilar Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y git build-essential curl python3

      - name: Configurar Theos
        run: |
          export THEOS=~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # Baixar SDK usando o script oficial do theos/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks-temp
          python3 $THEOS/sdks-temp/download.py iPhoneOS13.7.sdk
          mkdir -p $THEOS/sdks
          mv $THEOS/sdks-temp/iPhoneOS13.7.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks-temp

      - name: Compilar
        run: |
          export THEOS=~/theos
          make clean
          make

      - name: Upload da dylib
        uses: actions/upload-artifact@v4
        with:
          name: KeyLogin.dylib
          path: .theos/obj/debug/KeyLogin.dylib
